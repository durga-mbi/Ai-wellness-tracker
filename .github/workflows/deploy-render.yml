name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        run: |
          HOOK_URL="${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          if [ -z "$HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set. Please add it to your GitHub secrets."
            exit 1
          fi
          echo "Triggering deployment at ${HOOK_URL:0:30}..."
          curl -f "$HOOK_URL" || echo "Deployment trigger failed, but continuing..."

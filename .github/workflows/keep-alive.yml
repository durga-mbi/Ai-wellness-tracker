name: Keep Alive

on:
  schedule:
    - cron: '*/14 * * * *' # Run every 14 minutes
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Wellness API
        run: |
          URL="${{ secrets.RENDER_API_URL }}"
          if [ -z "$URL" ]; then
            echo "RENDER_API_URL secret is not set. Please add it to your GitHub secrets."
            exit 1
          fi
          echo "Pinging $URL/api/health..."
          curl -f "$URL/api/health" || echo "Ping failed, but continuing..."
